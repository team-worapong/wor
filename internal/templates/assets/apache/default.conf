#
# Generated by WOR CLI
# Default host for unmatched requests.
#
<VirtualHost *:80>
    ServerName _
    DocumentRoot "{{DEFAULT_PUBLIC_PATH}}"

    ErrorLog "{{APACHE_LOG_DIR}}/wor-default.error.log"
    CustomLog "{{APACHE_LOG_DIR}}/wor-default.access.log" combined

    <Directory "{{DEFAULT_PUBLIC_PATH}}">
        Require all granted
        AllowOverride None
        Options -Indexes +FollowSymLinks
    </Directory>
</VirtualHost>
