#
# Generated by {{PRODUCT_NAME}}
# Default host for unmatched requests.
# Do not edit manually unless you know what you are doing.
#
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root {{DEFAULT_PUBLIC_PATH}};
    index index.html;

    access_log {{NGINX_LOG_DIR}}/wor-default.access.log;
    error_log {{NGINX_LOG_DIR}}/wor-default.error.log warn;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
