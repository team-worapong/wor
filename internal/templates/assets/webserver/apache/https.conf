<VirtualHost *:443>
    ServerName {{HOST}}
    {{APACHE_SERVER_ALIAS}}
    {{APACHE_DOCUMENT_ROOT_LINE}}

    SSLEngine On
    SSLCertificateFile "{{SSL_CERT_FILE}}"
    SSLCertificateKeyFile "{{SSL_KEY_FILE}}"
    {{APACHE_SSL_CHAIN_FILE}}

    ErrorLog "{{APACHE_LOG_DIR}}/{{HOST}}.error.log"
    CustomLog "{{APACHE_LOG_DIR}}/{{HOST}}.access.log" combined

    {{APACHE_SERVICE_CONFIG}}

    {{APACHE_CUSTOM_INCLUDE}}
</VirtualHost>
