#
# Generated by WOR CLI
# Host: {{HOST}}
# Target: {{DOMAIN}}/{{SERVICE}}
#
server {
    listen 80;
    {{NGINX_HTTPS_CONFIG}}
    server_name {{SERVER_NAMES}};

    access_log {{NGINX_LOG_DIR}}/{{HOST}}.access.log;
    error_log {{NGINX_LOG_DIR}}/{{HOST}}.error.log;

    error_page 421 = @wor_default;
    {{NGINX_HOST_CHECK}}

    {{NGINX_REDIRECT}}

    {{NGINX_SERVICE_CONFIG}}

    location @wor_default {
        internal;
        root {{DEFAULT_PUBLIC_PATH}};
        try_files /index.html =404;
    }
}
